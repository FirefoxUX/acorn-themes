name: "Themes"

on:
  pull_request:
    branches:
      - "main"
    paths:
      - "themes/**"
      - "schemas/**"
      - "scripts/**"
      - ".github/workflows/validate-themes.yaml"
      - ".github/actions/post-feedback/**"
      - "package.json"
      - "package-lock.json"

jobs:
  validate:
    runs-on: "ubuntu-latest"
    name: "Manifest validation"
    permissions:
      contents: "read"
      pull-requests: "write"
      statuses: "write"

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate theme manifests
        run: node scripts/validate.js
        env:
          FEEDBACK_PATH: ${{ runner.temp }}/theme-feedback.json

      - name: Build smoke test
        run: npm run build

      - name: Post PR feedback
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/post-feedback
        with:
          marker: "<!-- acorn-themes-bot:validate -->"
          status_context: "Themes / manifest validation"
          feedback_path: ${{ runner.temp }}/theme-feedback.json
          outcome: ${{ job.status }}
